name: Build and Deploy (GitOps)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVICE: worker-static
  VALUES_YQ_PATH: .workerStatic.image.tag

jobs:
  build-push-gitops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (amd64 + layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ env.SERVICE }}:${{ github.sha }}
            cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ env.SERVICE }}:latest
          cache-from: |
            type=registry,ref=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ env.SERVICE }}:buildcache
          cache-to: type=registry,ref=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ env.SERVICE }}:buildcache,mode=max

      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          path: infra

      - name: Update image tag in Helm values
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq e '${{ env.VALUES_YQ_PATH }} = "${{ github.sha }}"' -i infra/helm/diploma-platform/values.yaml

      - name: Commit and push to infra
        run: |
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/diploma-platform/values.yaml
          git diff --staged --quiet || git commit -m "chore(${{ env.SERVICE }}): image ${{ github.sha }}"
          git push
